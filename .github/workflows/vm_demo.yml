name: setup vm demo

on: 
  workflow_dispatch:
    inputs:
      teleport-token:
        description: "teleport server token"
        required: true
        default: "5f42c6e8ea54df9e575fb08f83de1c68"
      # user:
      #   description: "system admin user"
      #   required: true
      #   default: "ZeaLoVe"

jobs:
  vm-up:
    name: Start a ubuntu vm 
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v2

      # - run: |
      #    sudo useradd ${{ github.event.inputs.user }}
      #    sudo usermod -g root ${{ github.event.inputs.user }}
      #  sudo sed -i "/^root.*/a\\${{ github.event.inputs.user }}  ALL=(ALL:ALL)       ALL" /etc/sudoers

      - run: |
         curl -O https://get.gravitational.com/teleport-v9.3.7-linux-amd64-bin.tar.gz
         tar -xzf teleport-v9.3.7-linux-amd64-bin.tar.gz
         cd teleport
         sudo ./install

      - run: |
         sudo teleport start --roles=node --token=${{ github.event.inputs.teleport-token }} --auth-server=${{ secrets.TELEPORT_SERVER }}
